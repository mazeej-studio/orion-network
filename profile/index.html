<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orion Network | ملف اللاعب الشخصي</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <style>
        /* 🎮 تعريف خط ماينكرافت الجديد الخاص بك */
        @font-face {
            font-family: 'MinecraftRegular';
            src: url('../MinecraftRegular-Bmg3.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'IBM Plex Sans Arabic', sans-serif; }
        body { background-color: #f5f5f7; color: #1d1d1f; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        body.menu-open { overflow: hidden; }
        
        /* الـ Loader المتناسق */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f5f5f7; z-index: 9999; display: flex; justify-content: center; align-items: center; transition: opacity 0.5s ease, visibility 0.5s; }
        .spinner { width: 40px; height: 40px; border: 3.5px solid rgba(0, 0, 0, 0.06); border-top-color: #1d1d1f; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        body.loaded #loader { opacity: 0; visibility: hidden; }

        /* التنبيهات الجانبية */
        .toast-container { position: fixed; top: 24px; right: -350px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border: 1px solid rgba(0, 0, 0, 0.06); box-shadow: 0 10px 30px rgba(0,0,0,0.08); padding: 1rem 1.4rem; border-radius: 18px; display: flex; align-items: center; gap: 12px; z-index: 9999; width: 310px; transition: right 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .toast-container.show { right: 24px; }
        .toast-icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .toast-container.success .toast-icon { background: rgba(52, 199, 89, 0.12); color: #34c759; }
        .toast-content h5 { font-size: 0.95rem; font-weight: 700; color: #000; }
        .toast-content p { font-size: 0.82rem; color: #6e6e73; margin-top: 2px; }

        /* الهيدر والـ Navbar الزجاجي المفرود */
        .glass-header { background: rgba(255, 255, 255, 0.75); backdrop-filter: blur(20px) saturate(180%); -webkit-backdrop-filter: blur(20px) saturate(180%); border-bottom: 1px solid rgba(0, 0, 0, 0.05); position: sticky; top: 0; z-index: 100; }
        header { max-width: 1300px; margin: 0 auto; width: 90%; padding: 1.1rem 0; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 1.4rem; font-weight: 700; color: #000; text-decoration: none; display: flex; align-items: center; gap: 12px; z-index: 101; }
        .logo-img { width: 32px; height: 32px; object-fit: contain; }
        .nav-links { display: flex; gap: 2.2rem; align-items: center; list-style: none; }
        .nav-links a { color: rgba(0, 0, 0, 0.65); text-decoration: none; font-size: 0.95rem; font-weight: 600; position: relative; padding: 6px 0; transition: color 0.25s ease; }
        .nav-links a:hover { color: #000; }
        .nav-links a::after { content: ''; position: absolute; bottom: 0; right: 0; width: 0; height: 2px; background-color: #1d1d1f; transition: width 0.3s ease; }
        .nav-links a:hover::after { width: 100%; }
        
        .header-actions { display: flex; align-items: center; gap: 1rem; }
        .btn-profile-nav { background: rgba(0, 122, 255, 0.1); color: #007aff; border: 1px solid rgba(0, 122, 255, 0.2); padding: 0.6rem 1.3rem; font-size: 0.9rem; font-weight: 700; border-radius: 12px; display: flex; align-items: center; gap: 8px; text-decoration: none; }
        
        .burger-menu { display: none; background: transparent; border: none; cursor: pointer; color: #1d1d1f; padding: 4px; z-index: 150; }
        .mobile-sidebar { position: fixed; top: 0; right: -100%; width: 280px; height: 100%; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(25px) saturate(180%); box-shadow: -10px 0 30px rgba(0,0,0,0.05); z-index: 140; display: flex; flex-direction: column; padding: 6rem 2rem 2rem 2rem; transition: right 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .mobile-sidebar.open { right: 0; }
        .mobile-sidebar ul { list-style: none; display: flex; flex-direction: column; gap: 1.8rem; margin-bottom: 2.5rem; }
        .mobile-sidebar ul a { color: #1d1d1f; text-decoration: none; font-size: 1.1rem; font-weight: 600; }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.05); backdrop-filter: blur(4px); z-index: 130; opacity: 0; visibility: hidden; transition: all 0.3s ease; }
        .sidebar-overlay.open { opacity: 1; visibility: visible; }

        /* حاوية التصميم المفرود */
        .wide-container { max-width: 1300px; width: 90%; margin: 4rem auto 6rem auto; flex: 1; display: flex; flex-direction: column; gap: 2.5rem; }
        .glass-card { background: rgba(255, 255, 255, 0.55); backdrop-filter: blur(30px) saturate(190%); -webkit-backdrop-filter: blur(30px) saturate(190%); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.02); border-radius: 28px; padding: 3rem 2.5rem; }

        .profile-hero { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 2rem; }
        .profile-main-info { display: flex; align-items: center; gap: 1.8rem; }
        .player-skin-avatar { width: 95px; height: 95px; border-radius: 22px; background: rgba(0,0,0,0.03); box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 2px solid #fff; }
        .player-text h1 { font-size: 2.4rem; font-weight: 700; color: #000; letter-spacing: -0.5px; }
        .player-text p { font-size: 1.05rem; color: #86868b; margin-top: 4px; font-weight: 500; }
        
        /* 🎨 تخصيص البادج وتغيير الخط لخط ماينكرافت فقط هنا */
        .badge-rank { 
            font-family: 'MinecraftRegular', sans-serif; /* تطبيق خطك الجديد هنا فقط */
            font-size: 1.1rem; 
            padding: 8px 20px; 
            border-radius: 12px; 
            display: inline-flex; 
            align-items: center; 
            gap: 8px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
        }

        /* جعل النص داخل السبان يرث خط ماينكرافت أيضاً */
        .badge-rank span {
            font-family: 'MinecraftRegular', sans-serif !important;
        }

        .user-username {
            font-family: 'MinecraftRegular', sans-serif !important;
        }

        /* لضمان بقاء الأيقونة بشكلها الصحيح بدون تخريبها بالخط الجديد */
        .badge-rank .material-symbols-rounded {
            font-family: 'Material Symbols Rounded' !important;
            font-size: 1.2rem;
        }
        
        .badge-rank.owner { background-color: #FFFF55; color: #ffffff;} /* &e */
        .badge-rank.admin { background-color: #FF5555; color: #ffffff; } /* &c */
        .badge-rank.creator { background-color: #FF5555; color: #ffffff; } /* &c */
        .badge-rank.moderator { background-color: #55FF55; color: #ffffff;} /* &a */
        .badge-rank.helper { background-color: #00AAAA; color: #ffffff;} /* &3 */
        .badge-rank.ultimate { background-color: #FF55FF; color: #ffffff; } /* &d */
        .badge-rank.elite { background-color: #55FFFF; color: #ffffff; } /* &b */
        .badge-rank.member { background-color: #AAAAAA; color: #ffffff; } /* &7 */

        .btn-logout { background: rgba(255, 59, 48, 0.08); color: #ff3b30; border: none; padding: 0.8rem 1.5rem; font-size: 0.95rem; font-weight: 600; border-radius: 14px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.2s ease; }
        .btn-logout:hover { background: rgba(255, 59, 48, 0.15); transform: translateY(-1px); }
        footer { text-align: center; padding: 3rem 0; color: #86868b; font-size: 0.9rem; border-top: 1px solid rgba(0,0,0,0.04); margin-top: auto; }

        @media (max-width: 900px) {
            .nav-links, .header-actions .btn-profile-nav span { display: none; }
            .burger-menu { display: block; }
            .profile-hero { flex-direction: column; align-items: flex-start; gap: 1.8rem; }
            .profile-main-info { flex-direction: column; align-items: flex-start; gap: 1.2rem; }
            .btn-logout { width: 100%; justify-content: center; }
            .wide-container { margin-top: 2rem; }
            .glass-card { padding: 2rem 1.5rem; }
        }

    </style>
</head>
<body>

    <div id="loader"><div class="spinner"></div></div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="toast-container success" id="toastNotification">
        <div class="toast-icon"><span class="material-symbols-rounded" id="toastIcon">check_circle</span></div>
        <div class="toast-content">
            <h5 id="toastTitle">إشعار الجلسة</h5>
            <p id="toastMessage">تم مزامنة رتبتك وألوانك بنجاح.</p>
        </div>
    </div>

    <div class="mobile-sidebar" id="mobileSidebar">
        <ul>
            <li><a href="../">الصفحة الرئيسية</a></li>
            <li><a href="./shop/">المتجر</a></li>
            <li><a href="./players/">اللاعبين</a></li>
        </ul>
        <button onclick="performLogout()" class="btn-logout" style="justify-content: center;">
            <span class="material-symbols-rounded">logout</span> تسجيل الخروج
        </button>
    </div>

    <div class="glass-header">
        <header>
            <a href="./" class="logo">
                <img src="../logo.png" class="logo-img" alt="Orion Logo">
                <span>Orion Network</span>
            </a>
            <ul class="nav-links">
                <li><a href="../">الصفحة الرئيسية</a></li>
                <li><a href="./shop/">المتجر</a></li>
                <li><a href="./players/">اللاعبين</a></li>
            </ul>
            <div class="header-actions">
                <a href="./" class="btn-profile-nav" id="navProfileBadge">
                    <img id="navAvatar" src="" onerror="this.src='https://visage.surgeplay.com/face/64/Steve.png'" style="width:22px; height:22px; border-radius:6px;">
                    <span id="navUsername" class="user-username">اللاعب</span>
                </a>
                <button class="burger-menu" id="burgerBtn" aria-label="Menu">
                    <span class="material-symbols-rounded" id="burgerIcon" style="font-size: 28px;">menu</span>
                </button>
            </div>
        </header>
    </div>

    <div class="wide-container">
        <div class="glass-card">
            <div class="profile-hero">
                <div class="profile-main-info">
                    <img id="playerBigAvatar" src="" onerror="this.src='https://visage.surgeplay.com/face/64/Steve.png'" class="player-skin-avatar" alt="Minecraft Face">
                    <div class="player-text">
                        <h1 id="playerProfileName" class="user-username">Loading...</h1>
                    </div>
                </div>
                
                <div style="display: flex; align-items: center; gap: 1.2rem; flex-wrap: wrap;">
                    <div id="playerRankBadge" class="badge-rank">
                        <span class="material-symbols-rounded">account_box</span>
                        <span id="rankText">MEMBER</span>
                    </div>
                    <button onclick="performLogout()" class="btn-logout">
                        <span class="material-symbols-rounded">logout</span> تسجيل الخروج
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Orion Network. جميع الحقوق محفوظة.</p>
    </footer>

    <script>
        let toastTimeout;
        function showToast(title, message, type = 'success') {
            const toast = document.getElementById('toastNotification');
            clearTimeout(toastTimeout);
            toast.classList.add('show');
            toastTimeout = setTimeout(() => toast.classList.remove('show'), 3500);
        }

        const burgerBtn = document.getElementById('burgerBtn');
        const burgerIcon = document.getElementById('burgerIcon');
        const mobileSidebar = document.getElementById('mobileSidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');

        function toggleMenu() {
            const isOpen = mobileSidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('open', isOpen);
            document.body.classList.toggle('menu-open', isOpen);
            burgerIcon.textContent = isOpen ? 'close' : 'menu';
        }
        if (burgerBtn) burgerBtn.addEventListener('click', toggleMenu);
        if (sidebarOverlay) sidebarOverlay.addEventListener('click', toggleMenu);

        function performLogout() {
            localStorage.removeItem('orion_logged_player');
            setTimeout(() => { window.location.href = 'index.html'; }, 500);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const loggedUser = localStorage.getItem('orion_logged_player');
            if (!loggedUser) { window.location.href = 'index.html'; return; }

            const allPlayers = JSON.parse(localStorage.getItem('orion_players') || '[]');
            const playerData = allPlayers.find(p => p.username.toLowerCase() === loggedUser.toLowerCase());

            if (!playerData) { localStorage.removeItem('orion_logged_player'); window.location.href = 'index.html'; return; }

            document.getElementById('navUsername').textContent = playerData.username;
            document.getElementById('navAvatar').src = `https://visage.surgeplay.com/face/64/${playerData.username}.png`;
            document.getElementById('playerProfileName').textContent = playerData.username;
            document.getElementById('playerBigAvatar').src = `https://visage.surgeplay.com/face/64/${playerData.username}.png`;

            const rankBadge = document.getElementById('playerRankBadge');
            const rankText = document.getElementById('rankText');
            
            const currentRank = (playerData.rank || 'MEMBER').toUpperCase();
            rankText.textContent = currentRank;

            rankBadge.className = 'badge-rank'; 
            
            if (currentRank === 'OWNER') {
                rankBadge.classList.add('owner');
            } else if (currentRank === 'ADMIN') {
                rankBadge.classList.add('admin');
            } else if (currentRank === 'MODERATOR') {
                rankBadge.classList.add('moderator');
            } else if (currentRank === 'HELPER') {
                rankBadge.classList.add('helper');
            } else if (currentRank === 'CREATOR') {
                rankBadge.classList.add('creator');
            } else if (currentRank === 'ULTIMATE') {
                rankBadge.classList.add('ultimate');
            } else if (currentRank === 'ELITE') {
                rankBadge.classList.add('elite');
            } else {
                rankBadge.classList.add('member');
            }

            setTimeout(() => { document.body.classList.add('loaded'); }, 500);
        });
    </script>
</body>
</html>
